{% load static %}
<header
    class="fixed top-0 left-0 right-0 z-50 bg-gradient-to-r from-primary-900 via-primary-800 to-primary-900 backdrop-blur-xl border-b border-white/5 shadow-[0_4px_30px_rgba(0,0,0,0.1)]">
    <div class="container mx-auto px-4 h-20 flex items-center justify-between relative">
        <!-- Logo -->
        <a href="/" class="flex items-center gap-3 group">
            <div
                class="w-12 h-12 bg-primary-500 rounded-2xl flex items-center justify-center text-white shadow-xl shadow-primary-500/20 group-hover:rotate-12 transition-all duration-500">
                <i class="fas fa-hotel text-2xl"></i>
            </div>
            <span class="text-2xl font-display font-bold tracking-tight text-white">
                HotelPro
            </span>
        </a>

        <!-- Desktop Navigation (Centered) -->
        <nav class="hidden lg:flex items-center gap-10 absolute left-1/2 -translate-x-1/2">
            <a href="#features"
                class="text-[11px] font-bold text-slate-200 hover:text-white transition-all uppercase tracking-[0.2em] shadow-sm">Features</a>
            <a href="#how-it-works"
                class="text-[11px] font-bold text-slate-200 hover:text-white transition-all uppercase tracking-[0.2em] shadow-sm">How
                it Works</a>
            <a href="#pricing"
                class="text-[11px] font-bold text-slate-200 hover:text-white transition-all uppercase tracking-[0.2em] shadow-sm">Pricing</a>
            <a href="#contact"
                class="text-[11px] font-bold text-slate-200 hover:text-white transition-all uppercase tracking-[0.2em] shadow-sm">Contact
                Us</a>
        </nav>

        <!-- Desktop Actions (Right) -->
        <div class="hidden lg:flex items-center gap-6">
            <!-- Professional Theme Slider -->
            <div class="relative flex items-center p-1 bg-white/5 rounded-full border border-white/10 w-16 h-8 cursor-pointer group hover:bg-white/10 transition-colors"
                id="theme-slider-container">
                <div id="theme-slider-thumb"
                    class="absolute w-6 h-6 bg-white rounded-full shadow-md transition-all duration-300 left-1 dark:left-9">
                </div>
                <div class="flex justify-between w-full px-1.5 z-10 pointer-events-none">
                    <i class="fas fa-sun text-[10px] text-amber-400"></i>
                    <i class="fas fa-moon text-[10px] text-slate-300"></i>
                </div>
            </div>

            <a href="{% url 'accounts:hotel_login' %}"
                class="px-8 py-3 bg-white text-primary-900 rounded-2xl text-[12px] font-bold uppercase tracking-wider hover:bg-slate-50 hover:shadow-[0_0_30px_rgba(255,255,255,0.3)] hover:scale-105 active:scale-95 transition-all">
                Start Free
            </a>
        </div>

        <!-- Mobile Menu Button -->
        <button id="mobile-menu-button"
            class="lg:hidden w-12 h-12 flex items-center justify-center text-slate-600 dark:text-slate-400 bg-slate-100 dark:bg-white/5 rounded-2xl">
            <i class="fas fa-bars-staggered text-xl"></i>
        </button>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu"
        class="hidden lg:hidden bg-primary-900/98 backdrop-blur-3xl border-t border-white/5 absolute top-20 left-0 right-0 p-8 animate-in slide-in-from-top duration-500 shadow-2xl">
        <nav class="flex flex-col gap-8">
            <a href="#features"
                class="text-xl font-display font-medium text-white hover:text-primary-300 transition-colors">Features</a>
            <a href="#how-it-works"
                class="text-xl font-display font-medium text-white hover:text-primary-300 transition-colors">How it
                works</a>
            <a href="#pricing"
                class="text-xl font-display font-medium text-white hover:text-primary-300 transition-colors">Pricing</a>
            <a href="#contact"
                class="text-xl font-display font-medium text-white hover:text-primary-300 transition-colors">Contact
                Us</a>
            <hr class="border-white/5">
            <div class="flex items-center justify-between py-2">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-[0.2em]">Appearance</span>
                <div class="relative flex items-center p-1 bg-white/5 rounded-full border border-white/10 w-16 h-8 cursor-pointer"
                    id="theme-slider-mobile">
                    <div
                        class="absolute w-6 h-6 bg-white rounded-full shadow-lg transition-all duration-300 left-1 dark:left-9">
                    </div>
                </div>
            </div>
            <a href="{% url 'accounts:hotel_login' %}"
                class="w-full py-5 bg-white text-primary-900 rounded-2xl text-center font-bold text-lg shadow-2xl shadow-white/10 active:scale-95 transition-all">
                Get Started Now
            </a>
        </nav>
    </div>
</header>
