<!-- Global AI Chat Widget -->
<!-- Floating Button -->
<button id="ai-chat-toggle"
    class="fixed bottom-8 right-8 z-50 w-16 h-16 rounded-2xl text-white shadow-2xl hover:scale-110 active:scale-95 transition-all duration-500 flex items-center justify-center group bg-slate-900 border border-white/20 shadow-primary-500/20"
    aria-label="Toggle AI Assistant">
    <div class="relative">
        <!-- Professional AI Spark SVG -->
        <svg class="w-8 h-8 text-primary-400 group-hover:rotate-12 transition-transform duration-500"
            viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3L14.4 9.6L21 12L14.4 14.4L12 21L9.6 14.4L3 12L9.6 9.6L12 3Z" fill="currentColor"
                stroke="currentColor" stroke-width="0.5" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M5 5L6.5 8.5L10 10L6.5 11.5L5 15L3.5 11.5L0 10L3.5 8.5L5 5Z" fill="white" class="opacity-50"
                transform="translate(14, 2) scale(0.6)" />
        </svg>
        <i
            class="fas fa-bell-concierge absolute -top-1 -right-1 text-[10px] text-accent-orange opacity-0 group-hover:opacity-100 transition-all duration-500 transform scale-50 group-hover:scale-100"></i>
    </div>
    <span class="absolute -top-1 -right-1 w-4 h-4 rounded-full animate-ping bg-primary-500 opacity-50"></span>
    <span class="absolute -top-1 -right-1 w-4 h-4 bg-primary-500 rounded-full border-2 border-white"></span>
</button>

<!-- Chat Container -->
<div id="ai-chat-widget"
    class="fixed bottom-28 right-8 z-50 w-96 max-w-[calc(100vw-2rem)] h-[550px] rounded-[2.5rem] shadow-2xl flex flex-col transform transition-all duration-500 origin-bottom-right scale-0 opacity-0 invisible glass-panel border-white/20 bg-slate-900/95 dark:bg-slate-950/95 backdrop-blur-2xl">

    <!-- Header -->
    <div class="px-8 py-6 flex items-center justify-between border-b border-white/10">
        <div class="flex items-center space-x-4">
            <div
                class="w-12 h-12 rounded-xl flex items-center justify-center bg-gradient-to-br from-slate-800 to-slate-900 border border-white/10 text-white shadow-lg relative overflow-hidden group">
                <div class="absolute inset-0 bg-primary-500/10 group-hover:bg-primary-500/20 transition-colors"></div>
                <svg class="w-6 h-6 text-primary-400 relative z-10" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 3L14.4 9.6L21 12L14.4 14.4L12 21L9.6 14.4L3 12L9.6 9.6L12 3Z" />
                </svg>
            </div>
            <div>
                <h3 class="text-white font-display font-bold text-base tracking-tight">HotelPro AI <span
                        class="text-[10px] bg-primary-500/20 text-primary-400 px-2 py-0.5 rounded-full ml-1">BETA</span>
                </h3>
                <p class="text-[10px] flex items-center text-emerald-400 font-bold uppercase tracking-widest mt-0.5">
                    <span
                        class="w-1.5 h-1.5 bg-emerald-500 rounded-full mr-2 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></span>
                    System Online
                </p>
            </div>
        </div>
        <button id="close-chat-widget"
            class="w-10 h-10 rounded-xl flex items-center justify-center text-white/40 hover:text-white hover:bg-white/10 transition-all border border-transparent hover:border-white/10">
            <i class="fas fa-times text-xs"></i>
        </button>
    </div>

    <!-- Messages Area -->
    <div id="widget-messages" class="flex-1 overflow-y-auto p-8 space-y-6 scrollbar-hide">
        <!-- Initial Message -->
        <div class="flex items-start space-x-4">
            <div
                class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 bg-primary-500/10 text-primary-400 border border-primary-500/20 shadow-inner">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 3L14.4 9.6L21 12L14.4 14.4L12 21L9.6 14.4L3 12L9.6 9.6L12 3Z" />
                </svg>
            </div>
            <div
                class="p-5 rounded-2xl rounded-tl-sm text-slate-200 text-sm leading-relaxed max-w-[80%] bg-white/5 border border-white/5 shadow-lg">
                <p>Greetings! I'm your professional AI Concierge. I can assist with <b>bookings</b>, <b>property
                        data</b>, or <b>system status</b>. How may I help you today?</p>
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="p-6 border-t border-white/10 bg-black/20">
        <form id="widget-chat-form" class="flex items-center space-x-3">
            <div
                class="flex-1 bg-white/5 border border-white/10 rounded-xl overflow-hidden focus-within:border-primary-500/50 transition-colors">
                <input type="text" id="widget-user-input"
                    class="w-full bg-transparent border-none focus:ring-0 text-white placeholder-slate-500 px-5 py-3 text-sm"
                    placeholder="Type a message..." autocomplete="off">
            </div>
            <button type="submit"
                class="w-11 h-11 rounded-xl bg-primary-500 text-white flex items-center justify-center shadow-lg hover:bg-primary-600 hover:shadow-primary-500/30 transition-all active:scale-95">
                <i class="fas fa-paper-plane text-xs"></i>
            </button>
        </form>
    </div>
</div>

<style>
    .scrollbar-hide::-webkit-scrollbar {
        display: none;
    }

    .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }

    .widget-message-bubble {
        animation: widgetFadeIn 0.3s ease-out forwards;
        opacity: 0;
        transform: translateY(10px);
    }

    @keyframes widgetFadeIn {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    #ai-chat-widget.open {
        transform: scale(1);
        opacity: 1;
        visibility: visible;
    }
</style>

<!-- Global Chat Widget Script -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const toggleBtn = document.getElementById('ai-chat-toggle');
        const widget = document.getElementById('ai-chat-widget');
        const closeBtn = document.getElementById('close-chat-widget');
        const widgetForm = document.getElementById('widget-chat-form');
        const widgetInput = document.getElementById('widget-user-input');
        const widgetMessages = document.getElementById('widget-messages');

        // Handle Toggle
        function toggleChat() {
            const isOpen = widget.classList.contains('open');
            if (isOpen) {
                widget.classList.remove('open');
            } else {
                widget.classList.add('open');
                setTimeout(() => widgetInput.focus(), 300);
            }
        }

        if (toggleBtn) toggleBtn.addEventListener('click', toggleChat);
        if (closeBtn) closeBtn.addEventListener('click', () => widget.classList.remove('open'));

        // Auto-scroll
        function scrollToBottomWidget() {
            if (widgetMessages) widgetMessages.scrollTop = widgetMessages.scrollHeight;
        }

        // Message Helper
        function addWidgetMessage(content, isUser = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${isUser ? 'justify-end' : 'justify-start'} widget-message-bubble space-x-3 mb-6`;

            const avatar = isUser ? '' :
                `<div class="w-10 h-10 rounded-xl flex items-center justify-center text-primary-400 text-xs flex-shrink-0 mt-1 bg-primary-500/10 border border-primary-500/20 shadow-inner">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L14.4 9.6L21 12L14.4 14.4L12 21L9.6 14.4L3 12L9.6 9.6L12 3Z"/></svg>
                 </div>`;

            const bubble = document.createElement('div');
            bubble.className = isUser ?
                'text-white p-5 rounded-3xl rounded-br-sm shadow-xl text-sm leading-relaxed max-w-[80%] bg-primary-500 shadow-primary-500/20' :
                'p-5 rounded-3xl rounded-tl-sm shadow-lg text-slate-200 text-sm leading-relaxed max-w-[80%] bg-white/5 border border-white/5';

            bubble.innerHTML = content;

            wrapper.innerHTML = isUser ? bubble.outerHTML : avatar + bubble.outerHTML;
            widgetMessages.appendChild(wrapper);
            scrollToBottomWidget();
        }

        // Loading Helper
        function addWidgetLoading() {
            const wrapper = document.createElement('div');
            wrapper.id = 'widget-loading';
            wrapper.className = 'flex justify-start widget-message-bubble space-x-3 mb-6';
            wrapper.innerHTML = `
                <div class="w-10 h-10 rounded-xl flex items-center justify-center text-primary-400 text-xs flex-shrink-0 mt-1 bg-primary-500/10 border border-primary-500/20">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L14.4 9.6L21 12L14.4 14.4L12 21L9.6 14.4L3 12L9.6 9.6L12 3Z"/></svg>
                </div>
                <div class="p-4 rounded-2xl rounded-tl-sm shadow-sm flex space-x-1.5 items-center h-12 bg-white/5 border border-white/5">
                    <div class="w-1.5 h-1.5 bg-primary-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                    <div class="w-1.5 h-1.5 bg-primary-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                    <div class="w-1.5 h-1.5 bg-primary-400 rounded-full animate-bounce" style="animation-delay: 0.3s"></div>
                </div>
            `;
            widgetMessages.appendChild(wrapper);
            scrollToBottomWidget();
        }

        function removeWidgetLoading() {
            const loader = document.getElementById('widget-loading');
            if (loader) loader.remove();
        }

        // Handle Submit
        if (widgetForm) {
            widgetForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const message = widgetInput.value.trim();
                if (!message) return;

                // Add user message
                addWidgetMessage(message, true);
                widgetInput.value = '';

                // Show loading
                addWidgetLoading();

                try {
                    // Use the correct URL for the chat API
                    const response = await fetch('/api/ai-chat/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            // Basic CSRF attempt - may need more robust handling in production
                            'X-CSRFToken': document.cookie.split('; ').find(row => row.startsWith('csrftoken='))?.split('=')[1] || ''
                        },
                        body: JSON.stringify({ message: message })
                    });

                    const data = await response.json();
                    removeWidgetLoading();

                    if (data.response) {
                        addWidgetMessage(data.response);
                    } else if (data.error) {
                        addWidgetMessage(`Error: ${data.error}`);
                    } else {
                        addWidgetMessage("I apologize, but I encountered an unknown error.");
                    }
                } catch (error) {
                    removeWidgetLoading();
                    addWidgetMessage("Network error. Please try again.");
                    console.error(error);
                }
            });
        }
    });
</script>
