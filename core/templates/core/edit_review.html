{% extends 'core/base.html' %}

{% block title %}Edit Review - HotelPro{% endblock %}

{% block content %}
<section class="py-20 bg-gradient-to-br from-blue-50 to-indigo-100 dark:from-gray-900 dark:to-gray-800 min-h-screen">
    <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="glass-card p-8 sm:p-10 rounded-3xl shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 to-purple-500"></div>
            <h3 class="text-2xl font-bold text-gray-900 dark:text-white mb-8 flex items-center">
                <i class="fas fa-edit mr-3 text-blue-500"></i> Edit Your Review
            </h3>

            <form method="post" class="space-y-6">
                {% csrf_token %}

                <div class="space-y-2">
                    <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Name</label>
                    <div class="relative rounded-md shadow-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user text-gray-400"></i>
                        </div>
                        <input type="text" id="name" name="name" required value="{{ review.name }}"
                            class="block w-full pl-10 pr-3 py-3 border border-gray-300 dark:border-gray-600 rounded-xl leading-5 bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200 sm:text-sm">
                    </div>
                </div>

                <!-- Star Rating -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Rating</label>
                    <div class="rating-container flex flex-row items-center space-x-1" dir="ltr">
                        {% for i in "12345" %}
                        <button type="button" class="rating-star text-3xl focus:outline-none" data-rating="{{ i }}"
                            aria-label="Rate {{ i }} star{{ i|pluralize }}">
                            <i class="far fa-star text-yellow-400 hover:text-yellow-500 transition-colors"
                                id="star-{{ i }}"></i>
                        </button>
                        {% endfor %}
                        <input type="hidden" name="rating" id="rating-input" value="{{ review.rating|default:5 }}"
                            required>
                        <span class="ml-2 text-sm text-gray-500 dark:text-gray-400" id="rating-text">({{
                            review.rating|default:5 }}/5)</span>
                    </div>
                </div>

                <div class="space-y-2">
                    <label for="comment"
                        class="block text-sm font-medium text-gray-700 dark:text-gray-300">Comment</label>
                    <div class="relative rounded-md shadow-sm">
                        <textarea id="comment" name="comment" rows="4" required
                            class="block w-full p-4 border border-gray-300 dark:border-gray-600 rounded-xl leading-5 bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200 sm:text-sm"
                            placeholder="Share your experience...">{{ review.comment }}</textarea>
                    </div>
                </div>

                <div class="flex space-x-4">
                    <a href="{% url 'reviews' %}"
                        class="flex-1 flex justify-center py-3 px-4 border border-gray-300 dark:border-gray-600 text-sm font-medium rounded-xl text-gray-700 dark:text-white bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all duration-200">
                        Cancel
                    </a>
                    <button type="submit"
                        class="flex-1 flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-xl text-white bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-200">
                        Update Review
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const stars = document.querySelectorAll('.rating-star');
        const ratingInput = document.getElementById('rating-input');
        const ratingText = document.getElementById('rating-text');

        // Rating descriptions
        const ratingDescriptions = {
            '1': 'Terrible',
            '2': 'Poor',
            '3': 'Average',
            '4': 'Good',
            '5': 'Excellent'
        };

        // Set initial state
        function setRating(rating) {
            stars.forEach(star => {
                const starRating = parseInt(star.getAttribute('data-rating'));
                const starIcon = star.querySelector('i');

                if (starRating <= rating) {
                    starIcon.classList.remove('far');
                    starIcon.classList.add('fas');
                } else {
                    starIcon.classList.remove('fas');
                    starIcon.classList.add('far');
                }
            });

            ratingInput.value = rating;
            ratingText.textContent = `(${rating}/5) ${ratingDescriptions[rating] || ''}`;
        }

        // Handle star click
        stars.forEach(star => {
            star.addEventListener('click', () => {
                const rating = parseInt(star.getAttribute('data-rating'));
                setRating(rating);
            });

            // Hover effect
            star.addEventListener('mouseenter', () => {
                const rating = parseInt(star.getAttribute('data-rating'));
                stars.forEach(s => {
                    const sRating = parseInt(s.getAttribute('data-rating'));
                    const sIcon = s.querySelector('i');

                    if (sRating <= rating) {
                        sIcon.classList.add('text-yellow-500');
                    }
                });
            });

            star.addEventListener('mouseleave', () => {
                const currentRating = parseInt(ratingInput.value);
                stars.forEach(s => {
                    const sIcon = s.querySelector('i');
                    sIcon.classList.remove('text-yellow-500');
                });
                setRating(currentRating);
            });
        });

        // Initialize with existing star rating
        const initialRating = parseInt("{{ review.rating|default:5 }}");
        setRating(initialRating);
    });
</script>
{% endblock %}
