<div class="input-group full-width">
    <label class="section-subtitle"><i class="fas fa-concierge-bell"></i> 2B. Premium Logistics & Services</label>

    <div class="selection-pill-group" id="servicesGrid">
        {% for value, label in form.fields.room_services.choices %}
        <label class="pill-label">
            <input type="checkbox" name="services" value="{{ value }}" 
            {% if value in form.services.value or 'Wifi' in label or 'Parking' in label %}checked{% endif %} style="display: none;">

            <i
                class="{% if 'Wifi' in label %}fas fa-wifi{% elif 'Parking' in label %}fas fa-car{% elif 'Pool' in label %}fas fa-swimming-pool{% else %}fas fa-check-circle{% endif %}"></i>

            {{ label }}
        </label>
        {% endfor %}
    </div>

    <!-- Elite Custom Service Input -->
    <div class="pill-input-wrapper">
        <input type="text" id="customServiceInput"
            placeholder="Manually registry global services (e.g. Yoga Studio, Private Valet)...">
        <button type="button" id="addServiceBtn" class="pill-add-btn">
            <i class="fas fa-plus"></i>
        </button>
    </div>
</div>
