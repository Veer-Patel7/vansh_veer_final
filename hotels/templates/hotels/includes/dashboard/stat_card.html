{% comment %}
Shortened tags for formatter stability: i=icon, l=label, v=value, t=trend, tc=trend_class, th=theme
{% endcomment %}
<div
    class="glass-panel p-6 rounded-[2rem] flex flex-col gap-5 transition-all duration-300 hover:scale-[1.02] hover:shadow-xl hover:shadow-primary-500/5 group">
    <div class="flex items-center justify-between">
        <div
            class="w-12 h-12 rounded-2xl bg-white border border-slate-100 flex items-center justify-center text-primary-600 shadow-sm group-hover:bg-primary-600 group-hover:text-white group-hover:border-primary-600 transition-all duration-300">
            <i class="fas {{ i }} text-lg"></i>
        </div>
        {% if t %}
        <div
            class="flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider {% if tc == 'down' %}bg-rose-50 text-rose-600 border border-rose-100{% else %}bg-emerald-50 text-emerald-600 border border-emerald-100{% endif %}">
            <i class="fas fa-arrow-{% if tc == 'down' %}down{% else %}up{% endif %}"></i>
            {{ t }}
        </div>
        {% endif %}
    </div>

    <div class="flex flex-col gap-1">
        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{{ l }}</span>
        <div class="flex items-baseline gap-1">
            <span class="text-3xl font-display font-bold text-slate-900 tracking-tight">{{ v }}</span>
            {% if l == 'Revenue' %}
            <span class="text-xs font-bold text-slate-400">Monthly</span>
            {% endif %}
        </div>
    </div>
</div>
