<div
    class="p-5 rounded-2xl bg-white border border-slate-100 shadow-sm hover:shadow-md hover:border-primary-500/20 hover:scale-[1.02] transition-all duration-300">
    <div class="flex items-center justify-between mb-3">
        <span class="text-xs font-bold text-slate-900 uppercase tracking-tight">{{ review.name }}</span>
        <div class="flex gap-0.5 text-[10px] text-amber-400">
            {% for i in "12345"|make_list %}
            <i class="fas fa-star{% if forloop.counter > review.rating %} text-slate-200{% endif %}"></i>
            {% endfor %}
        </div>
    </div>
    <p class="text-xs font-medium text-slate-600 leading-relaxed italic">"{{ review.comment|truncatechars:80 }}"</p>
    <div class="mt-4 flex items-center justify-between pt-3 border-t border-slate-50">
        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{{
            review.hotel.hotel_name|default:"General" }}</span>
        <span class="text-[9px] font-bold text-slate-300 uppercase tracking-widest">{{ review.created_at|date:"M d, Y"
            }}</span>
    </div>
</div>
