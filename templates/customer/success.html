{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Success</title>
    <link rel="stylesheet" href="{% static 'customer/success.css' %}">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">HotelPro</div>
</div>

<!-- CENTER WRAPPER -->
<div class="confirm-wrapper">
    
    <div class="confirm-card">
        <h2>Booking Confirmed 🎉</h2>
        <p style="margin-bottom:25px; font-size:14px; color:#555;">
            Thank you for your booking. We look forward to hosting you!
        </p>

        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="confirm-btn">Go to Home</button>
        </form>
    </div>

</div>

</body>
</html>
