{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Guest Details</title>
    <link rel="stylesheet" href="{% static 'customer/booking_details.css' %}">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">HotelPro</div>
</div>

<!-- PAGE TITLE -->
<h2 class="page-title">Enter Guest Details</h2>

<!-- FORM CARD -->
<form method="POST">
{% csrf_token %}

<label>Check-in:</label>
<input type="date" name="checkin_date" id="checkin_date" required>

<label>Check-out:</label>
<input type="date" name="checkout_date" id="checkout_date" required>

<p class="max-guest">Maximum allowed guests: {{ room.max_guest }}</p>

<label>Adults:</label>
<input type="number" id="adults" name="adults" min="1" max="{{ room.max_guest }}" required>

<label>Children:</label>
<input type="number" id="children" name="children" min="0" max="{{ room.max_guest }}" required>

<label>Total Guests:</label>
<input type="number" name="total_guests" id="total" readonly>

<label>Payment:</label>
<select name="payment_method">
    <option value="cash">Cash</option>
    <option value="card">Card</option>
    <option value="upi">UPI</option>
</select>

<button type="submit">Continue</button>

</form>

<script>

const checkin = document.getElementById("checkin_date");
const checkout = document.getElementById("checkout_date");

// India date
const indiaDate = new Date().toLocaleDateString("en-CA", {
    timeZone: "Asia/Kolkata"
});

checkin.min = indiaDate;

checkin.addEventListener("change", function () {
    if (!this.value) return;

    let checkinDate = new Date(this.value);
    checkinDate.setDate(checkinDate.getDate() + 1);

    let minCheckout = checkinDate.toLocaleDateString("en-CA", {
        timeZone: "Asia/Kolkata"
    });

    checkout.min = minCheckout;

    if (checkout.value && checkout.value <= this.value) {
        checkout.value = "";
    }
});

// Auto total
const maxGuests = parseInt("{{ room.max_guest }}");

function updateTotal(){
    let adults = parseInt(document.getElementById("adults").value) || 0;
    let children = parseInt(document.getElementById("children").value) || 0;

    let total = adults + children;

    if (total > maxGuests) {
        alert("Total guests cannot exceed " + maxGuests);
        document.getElementById("children").value = 0;
        total = adults;
    }

    document.getElementById("total").value = total;
}

document.getElementById("adults").addEventListener("input", updateTotal);
document.getElementById("children").addEventListener("input", updateTotal);

</script>

</body>
</html>
