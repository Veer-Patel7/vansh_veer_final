{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Login | HotelPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #002147;
            --secondary: #3B82F6;
            --accent: #D4AF37;
            --bg-glass: rgba(255, 255, 255, 0.8);
            --border: rgba(255, 255, 255, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #002147 0%, #000a1a 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Abstract Background Elements */
        .bg-blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--secondary) 0%, transparent 70%);
            filter: blur(80px);
            opacity: 0.15;
            z-index: 0;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from {
                transform: translate(-20%, -20%);
            }

            to {
                transform: translate(20%, 20%);
            }
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .glass-card {
            background: var(--bg-glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 60px 50px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-box {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-box i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.3));
        }

        .logo-box h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -1px;
        }

        .logo-box p {
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 500;
            margin-top: 5px;
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1rem;
            transition: color 0.3s;
        }

        input {
            width: 100%;
            padding: 18px 20px 18px 55px;
            background: white;
            border: 1.5px solid #edf2f7;
            border-radius: 18px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--primary);
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        input:focus+i {
            color: var(--secondary);
        }

        .btn-login {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(0, 33, 71, 0.2);
        }

        .btn-login:hover {
            background: var(--secondary);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .form-footer {
            margin-top: 35px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-footer a {
            color: var(--secondary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            transition: opacity 0.3s;
        }

        .form-footer a:hover {
            opacity: 0.7;
        }

        .alert-error {
            background: #fff5f5;
            color: #c53030;
            padding: 12px 15px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 25px;
            border-left: 4px solid #c53030;
        }
    </style>
</head>

<body>
    <div class="bg-blob" style="top: -100px; left: -100px;"></div>
    <div class="bg-blob"
        style="bottom: -100px; right: -100px; background: radial-gradient(circle, var(--accent) 0%, transparent 70%);">
    </div>

    <div class="login-container">
        <div class="glass-card">
            <div class="logo-box">
                <i class="fas fa-hotel"></i>
                <h1>HotelPro</h1>
                <p>Executive Management Portal</p>
            </div>

            <form method="post">
                {% csrf_token %}

                {% if form.non_field_errors %}
                {% for error in form.non_field_errors %}
                <div class="alert-error">
                    <i class="fas fa-exclamation-circle mr-2"></i> {{ error }}
                </div>
                {% endfor %}
                {% endif %}

                <div class="input-group">
                    <input type="email" name="email" placeholder="Email Address" required>
                    <i class="fas fa-envelope"></i>
                </div>

                <div class="input-group">
                    <input type="password" name="password" placeholder="Secure Password" required>
                    <i class="fas fa-lock-shield"></i>
                </div>

                <button type="submit" class="btn-login">Authorize Access <i class="fas fa-arrow-right ml-2"
                        style="font-size: 0.8rem;"></i></button>

                <div class="form-footer">
                    <a href="{% url 'accounts:forgot_password' %}">Credentials Displaced?</a>
                    <p style="font-size: 0.85rem; color: #64748b; font-weight: 600;">First time here? <a
                            href="{% url 'accounts:hotel_signup' %}" style="display:inline;">Initialize Account</a></p>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
