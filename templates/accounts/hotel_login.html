{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hotel Admin Login</title>

    <!-- AdminLTE CSS -->
    <link rel="stylesheet" href="{% static 'adminlte/dist/css/adminlte.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="login-page bg-body-secondary">

<div class="login-box">
    <div class="card card-outline card-success">

        <div class="card-header text-center">
            <h1><b>Hotel</b> Admin Login</h1>
        </div>

        <div class="card-body login-card-body">
            <p class="login-box-msg">Sign in to manage your hotel</p>

            <form method="post">
                {% csrf_token %}

                <!-- Non-field errors -->
                {% if form.non_field_errors %}
                    <div class="alert alert-danger">
                        {{ form.non_field_errors }}
                    </div>
                {% endif %}

                <!-- Email -->
                <div class="input-group mb-3">
                    {{ form.email }}
                    <div class="input-group-text">
                        <span class="bi bi-envelope"></span>
                    </div>
                </div>
                {{ form.email.errors }}

                <!-- Password -->
                <div class="input-group mb-3">
                    {{ form.password }}
                    <div class="input-group-text">
                        <span class="bi bi-lock-fill"></span>
                    </div>
                </div>
                {{ form.password.errors }}

                <div class="row">
                    <div class="col-8">
                        <a href="{% url 'accounts:forgot_password' %}">
                            Forgot Password?
                        </a>
                    </div>

                    <div class="col-4">
                        <button type="submit" class="btn btn-success w-100">
                            Login
                        </button>
                    </div>
                </div>
            </form>

            <p class="mt-3 text-center">
                <a href="{% url 'accounts:hotel_signup' %}">
                    Create Account
                </a>
            </p>

        </div>
    </div>
</div>

<!-- AdminLTE JS -->
<script src="{% static 'adminlte/dist/js/adminlte.js' %}"></script>

</body>
</html>
