{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Super Admin Login</title>

    <link rel="stylesheet" href="{% static 'adminlte/dist/css/adminlte.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .form-control {
            border-radius: 10px;
            height: 45px;
        }

        .login-btn {
            height: 45px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            transition: 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(220,53,69,0.4);
        }

        .brand-title {
            font-weight: 700;
            letter-spacing: 1px;
        }
    </style>
</head>

<body class="login-page d-flex align-items-center justify-content-center">

<div class="login-box">
    <div class="card card-outline card-danger">

        <div class="card-header text-center">
            <h2 class="brand-title text-danger">
                <i class="bi bi-shield-lock-fill"></i> Super Admin
            </h2>
            <p class="text-muted mb-0">Secure access to control panel</p>
        </div>

        <div class="card-body">

            {% if form.non_field_errors %}
                <div class="alert alert-danger">
                    {{ form.non_field_errors }}
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <!-- Username -->
                <div class="input-group mb-3">
                    {{ form.username }}
                    <div class="input-group-text">
                        <i class="bi bi-person-fill"></i>
                    </div>
                </div>

                <!-- Password -->
                <div class="input-group mb-4">
                    {{ form.password }}
                    <div class="input-group-text"
                         style="cursor:pointer;"
                         onclick="togglePassword()">
                        <i class="bi bi-eye-slash-fill" id="toggleIcon"></i>
                    </div>
                </div>

                <button type="submit"
                        class="btn btn-danger login-btn w-100">
                    Login
                </button>

            </form>

        </div>
    </div>
</div>

<script src="{% static 'adminlte/dist/js/adminlte.js' %}"></script>

<script>
function togglePassword() {
    const password = document.getElementById("id_password");
    const icon = document.getElementById("toggleIcon");

    if (password.type === "password") {
        password.type = "text";
        icon.classList.replace("bi-eye-slash-fill","bi-eye-fill");
    } else {
        password.type = "password";
        icon.classList.replace("bi-eye-fill","bi-eye-slash-fill");
    }
}
</script>

</body>
</html>
