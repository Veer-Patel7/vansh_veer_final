{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OTP Verification</title>

    <link rel="stylesheet" href="{% static 'adminlte/dist/css/adminlte.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="login-page bg-body-secondary">

<div class="login-box">
    <div class="card card-outline card-info">

        <div class="card-header text-center">
            <h1><b>OTP</b> Verification</h1>
        </div>

        <div class="card-body login-card-body">

            <p class="login-box-msg">
                OTP has been sent to:
                <br>
                <strong>{{ email }}</strong>
            </p>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-success">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="input-group mb-3">
                    <input type="text"
                           name="otp"
                           class="form-control text-center"
                           placeholder="Enter 6-digit OTP"
                           maxlength="6"
                           style="letter-spacing:6px; font-size:20px;"
                           required>

                    <div class="input-group-text">
                        <span class="bi bi-shield-lock-fill"></span>
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-info">
                        Verify OTP
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>

<script src="{% static 'adminlte/dist/js/adminlte.js' %}"></script>

</body>
</html>
